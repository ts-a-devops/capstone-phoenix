# Platform: ingress controller. sync-wave -2 so it's healthy before the app's Ingress syncs.
# Type LoadBalancer + k3s klipper servicelb exposes 80/443 on the node public IPs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: phoenix
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3   # TODO: verify/bump chart version
    helm:
      values: |
        controller:
          service:
            type: LoadBalancer
          ingressClassResource:
            default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
